app:
  start_mode: auto
  minimize_to_tray: true
  show_window_on_start: false
  # Optional. Empty means logs are kept in memory only.
  log_file:

proxy:
  listen: 127.0.0.1:18080
  # Optional. Bind direct connections to a local NIC IP to avoid a TUN adapter
  # becoming the default route for direct traffic. Leave empty to use OS routing.
  direct_bind_ip:
  # Optional. Forward foreign traffic to the local mixed-port of Tyty / Mihomo.
  foreign_proxy:

vpn:
  tyty:
    exe: C:\Program Files\Tyty\Tyty.exe
    process: Tyty
    # Optional PowerShell command used before switching to GlobalProtect.
    stop_command:
    adapter_keywords:
      - Mihomo
      - Meta Tunnel
  globalprotect:
    exe: C:\Program Files\Palo Alto Networks\GlobalProtect\PanGPA.exe
    process: PanGPA
    # Optional PowerShell command used before switching to Tyty.
    stop_command:
    adapter_keywords:
      - PANGP
      - GlobalProtect

rules:
  # Company domains. Matched requests start GlobalProtect.
  company_domains:
    - company.example.com
    - "*.corp.example.com"

  # Foreign domains. Matched requests start Tyty.
  foreign_domains:
    - google.com
    - "*.google.com"
    - github.com
    - "*.github.com"
    - chatgpt.com
    - "*.chatgpt.com"
    - openai.com
    - "*.openai.com"
    - cursor.sh
    - "*.cursor.sh"

  # Always direct. This has the highest priority.
  direct_domains:
    - localhost
    - "*.local"
